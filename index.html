<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
:root{
  --bg:#06080e;--surface:#111827;--deep:#0b0f1a;
  --g:rgba(255,255,255,.06);--g2:rgba(255,255,255,.11);
  --txt:#e8eef8;--muted:rgba(232,238,248,.38);--muted2:rgba(232,238,248,.2);
}
body{background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;font-size:14px;min-height:100vh}

/* ── ANIMATABLE ANGLE ── */
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}

/* ── HEADER ── */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;
  background:rgba(6,8,14,.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--g);
}
.header-title{font-size:18px;font-weight:800;letter-spacing:-.02em}
.header-sub{font-family:'Syne Mono',monospace;font-size:9px;color:var(--muted2);letter-spacing:.1em;margin-top:2px}
.deck-btn{
  font-family:'Syne Mono',monospace;font-size:11px;letter-spacing:.08em;
  background:transparent;color:var(--muted);border:1px solid var(--g2);
  border-radius:999px;padding:8px 18px;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.deck-btn:hover,.deck-btn.active{color:#e8eef8;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06)}
.deck-btn.active{background:rgba(79,255,176,.1);border-color:rgba(79,255,176,.3);color:#4fffb0}

/* ── FILTERS ── */
.filters-wrap{
  position:sticky;top:61px;z-index:90;
  background:rgba(6,8,14,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--g);padding:10px 24px;
}
.filters-wrap::before,.filters-wrap::after{
  content:'';position:absolute;top:0;bottom:0;width:24px;z-index:2;pointer-events:none;
}
.filters-wrap::before{left:0;background:linear-gradient(to right,rgba(6,8,14,.9),transparent)}
.filters-wrap::after{right:0;background:linear-gradient(to left,rgba(6,8,14,.9),transparent)}
.filters{
  display:flex;gap:6px;overflow-x:auto;align-items:center;
  max-width:1400px;margin:0 auto;
  -ms-overflow-style:none;scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none}
.filter-pill{
  font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:.06em;
  background:transparent;color:var(--muted);border:1px solid var(--g2);
  border-radius:999px;padding:6px 14px;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.filter-pill:hover{color:#e8eef8;border-color:rgba(255,255,255,.2)}
.filter-pill.active{
  color:#fff;
  border-color:var(--pill-c1,rgba(255,255,255,.4));
  background:color-mix(in srgb,var(--pill-c1,#fff) 18%,transparent);
}
.filter-divider{
  width:1px;height:20px;background:var(--g2);flex-shrink:0;margin:0 4px;
}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  max-width:1400px;margin:0 auto;
  padding:120px 24px 60px;
}
@media(max-width:1200px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:860px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.grid{grid-template-columns:1fr;padding:110px 14px 40px}.header{padding:12px 14px}.filters-wrap{padding:8px 14px}}
/* Surprise me button */
.surprise-btn{
  font-family:'Syne Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.06em;
  background:linear-gradient(135deg,#f97316,#ec4899,#8b5cf6);
  color:#fff;border:none;
  border-radius:999px;padding:9px 18px;cursor:pointer;transition:all .25s;white-space:nowrap;flex-shrink:0;
}
.surprise-btn:hover{opacity:.85;transform:scale(1.05)}
.surprise-btn:active{transform:scale(.95)}

/* Bigger pills on desktop too */
.filter-pill{padding:9px 18px;font-size:11px}

@media(max-width:600px){
  .header{padding:10px 14px}
  .header-title{font-size:15px}
  .header-sub{display:none}
  .header-right{gap:6px}
  .auth-btn,.deck-btn{font-size:9px;padding:6px 12px}
  .filters-wrap{top:44px;padding:8px 14px}
  .filters{gap:6px}
  .filter-pill{font-size:11px;padding:9px 18px}
  .surprise-btn{font-size:11px;padding:9px 18px}
  .grid{grid-template-columns:1fr;padding:88px 14px 40px;gap:14px}
  .card-flipper{aspect-ratio:5/6}
  .c-title{font-size:14px}
}

/* ── SKELETON ── */
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.15}}
.skeleton{
  aspect-ratio:3/4;border-radius:12px;
  background:var(--surface);animation:pulse 1.5s ease-in-out infinite;
}

/* ── EMPTY STATE ── */
.empty-state{
  grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:80px 20px;color:var(--muted);text-align:center;
}
.empty-state .big{font-size:40px;line-height:1}
.empty-state p{font-family:'Syne Mono',monospace;font-size:12px;letter-spacing:.06em}

/* ── CARD WRAPPER ── */
.card-wrap{
  contain:layout style;
}
.card-wrap.hidden{display:none}
.card-wrap.saved .collector-shell{box-shadow:0 0 24px -4px rgba(var(--c1-rgb),0.35)}

/* ── COLLECTOR SHELL (border container) ── */
.collector-shell{
  position:relative;border-radius:14px;
  perspective:1000px;
  cursor:pointer;
}

/* ── IRIDESCENT BORDER (on shell, outside overflow:hidden) ── */
@keyframes rotate-border{0%{--angle:0deg}100%{--angle:360deg}}
.collector-shell::before{
  content:'';position:absolute;inset:-2px;z-index:0;border-radius:16px;
  background:conic-gradient(from var(--angle),#f0abfc,#818cf8,#38bdf8,#34d399,#fbbf24,#fb7185,#f0abfc);
  animation:rotate-border 4s linear infinite;
  opacity:.4;transition:opacity .3s;
}
.collector-shell:hover::before{opacity:1}
.card-wrap.saved .collector-shell::before{opacity:1}

/* ── COLLECTOR CARD ── */
.collector{
  backface-visibility:hidden;position:absolute;inset:0;border-radius:12px;overflow:hidden;z-index:1;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:16px;color:#fff;
  background-size:cover;background-position:center;background-color:var(--deep);
}
.collector::before{
  content:'';position:absolute;inset:0;z-index:0;
  background:
    linear-gradient(135deg,var(--c1) 0%,transparent 50%),
    linear-gradient(225deg,var(--c2) 0%,transparent 50%),
    linear-gradient(180deg,rgba(0,0,0,.3) 0%,rgba(0,0,0,.8) 100%);
}
.collector::after{
  content:'';position:absolute;inset:0;z-index:3;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.12) 0%,transparent 60%);
  opacity:0;transition:opacity .25s;pointer-events:none;
}
.collector-shell:hover .collector::after{opacity:1}

/* ── CARD FLIP (Raichu-style: lift + half turn) ── */
.card-flipper{
  position:relative;
  transform-style:preserve-3d;
  aspect-ratio:3/4;
  --flip-h:5em;
  animation-fill-mode:both;
}

@keyframes flip-to-back{
  0%  {transform:translateZ(0) rotateY(0deg)}
  50% {transform:translateZ(var(--flip-h)) rotateY(-90deg)}
  100%{transform:translateZ(0) rotateY(-180deg)}
}
@keyframes flip-to-front{
  0%  {transform:translateZ(0) rotateY(-180deg)}
  50% {transform:translateZ(var(--flip-h)) rotateY(-90deg)}
  100%{transform:translateZ(0) rotateY(0deg)}
}

.card-flipper.flipping-to-back{animation:flip-to-back .65s ease-in-out both}
.card-flipper.flipping-to-front{animation:flip-to-front .65s ease-in-out both}
.card-flipper.flipped{transform:rotateY(-180deg)}
.card-back{
  backface-visibility:hidden;
  transform:rotateY(180deg);
  position:absolute;inset:0;
  border-radius:12px;overflow:hidden;
  background:var(--surface);
  display:flex;flex-direction:column;
  padding:16px;color:var(--txt);
  overflow-y:auto;scrollbar-width:thin;
  scrollbar-color:var(--g2) transparent;
}
.card-back::-webkit-scrollbar{width:4px}
.card-back::-webkit-scrollbar-thumb{background:var(--g2);border-radius:2px}

.cb-hint{font-family:'Syne Mono',monospace;font-size:9px;color:var(--muted2);letter-spacing:.08em;margin-bottom:12px;cursor:pointer}
.cb-title{font-size:15px;font-weight:800;line-height:1.25;margin-bottom:4px}
.cb-track{font-family:'Syne Mono',monospace;font-size:9px;color:var(--c1,var(--muted));letter-spacing:.08em;margin-bottom:12px}
.cb-divider{height:1px;background:var(--g2);margin:8px 0}
.cb-pitch{font-style:italic;font-size:13px;line-height:1.5;color:#4fffb0;margin:4px 0}
.cb-speaker{font-size:12px;font-weight:700;margin-top:4px}
.cb-role{font-family:'Syne Mono',monospace;font-size:10px;color:var(--muted2)}
.cb-meta{font-family:'Syne Mono',monospace;font-size:10px;color:var(--muted2);margin-top:8px;display:flex;flex-direction:column;gap:3px}
.cb-desc{font-size:11px;line-height:1.55;color:var(--muted);margin-top:8px;flex:1}
.cb-save{
  font-family:'Syne Mono',monospace;font-size:11px;letter-spacing:.08em;
  background:transparent;color:var(--muted);border:1px solid var(--g2);
  border-radius:10px;padding:10px 0;cursor:pointer;transition:all .25s;
  width:100%;text-align:center;margin-top:auto;flex-shrink:0;
}
.cb-save:hover{color:#fff;font-weight:700;border-color:var(--c1,rgba(255,255,255,.3));background:var(--c1,#4fffb0)}
.card-wrap.saved .cb-save{color:var(--c1);border-color:var(--c1);background:color-mix(in srgb,var(--c1) 15%,transparent)}

/* (iridescent border moved to .collector-shell::before above) */

/* ── CARD INNER ── */
.c-head,.c-body,.c-foot{position:relative;z-index:2}
.c-head{display:flex;justify-content:space-between;align-items:flex-start}
.c-head-left{display:flex;flex-direction:column;gap:2px}
.c-day{font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:.12em;opacity:.7}
.c-room{font-family:'Syne Mono',monospace;font-size:8px;letter-spacing:.1em;opacity:.45}
.c-head-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.c-conf{font-family:'Syne Mono',monospace;font-size:7px;letter-spacing:.15em;opacity:.5}
.c-barcode{
  width:48px;height:14px;
  background:repeating-linear-gradient(90deg,
    rgba(255,255,255,.5) 0px,rgba(255,255,255,.5) var(--bw,1.5px),
    transparent var(--bw,1.5px),transparent calc(var(--bw,1.5px) + 1.5px)
  );
  opacity:.35;
}
.c-body{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 6px}
.c-title{font-size:15px;font-weight:700;line-height:1.25;letter-spacing:-.01em;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.c-foot{display:flex;justify-content:space-between;align-items:flex-end}
.c-foot-left{display:flex;flex-direction:column;gap:2px}
.c-track{font-family:'Syne Mono',monospace;font-size:8px;letter-spacing:.1em;opacity:.6;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-type{
  font-family:'Syne Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
}
.c-copy{font-family:'Syne Mono',monospace;font-size:7px;opacity:.3;letter-spacing:.06em}

/* Save button on front face */
.c-save{
  position:relative;z-index:4;
  font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:.08em;
  background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15);
  border-radius:10px;padding:10px 0;cursor:pointer;transition:all .25s;
  width:100%;text-align:center;margin-top:8px;
}
.c-save:hover{color:#fff;font-weight:700;border-color:var(--c1);background:var(--c1)}
.card-wrap.saved .c-save{color:var(--c1);border-color:var(--c1);background:rgba(0,0,0,.5)}

/* ── TYPE COLORS ── */
.type-keynote{color:#fbbf24}
.type-workshop{color:#60a5fa}
.type-talk{color:rgba(255,255,255,.6)}
.type-lightning{color:#c084fc}
.type-expo{color:rgba(255,255,255,.45)}


/* ── ERROR STATE ── */
.error-state{
  grid-column:1/-1;text-align:center;padding:80px 20px;color:#ff5555;
}
.error-state p{font-family:'Syne Mono',monospace;font-size:12px;margin-top:8px;color:var(--muted)}

/* ── DECK VIEW ── */
.deck-view{
  max-width:1000px;margin:0 auto;padding:100px 24px 60px;
}
.deck-view.hidden{display:none}
.deck-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:28px;flex-wrap:wrap;gap:12px;
}
.deck-back-btn{
  font-family:'Syne Mono',monospace;font-size:11px;letter-spacing:.08em;
  background:transparent;color:var(--muted);border:1px solid var(--g2);
  border-radius:999px;padding:8px 18px;cursor:pointer;transition:all .2s;
}
.deck-back-btn:hover{color:#e8eef8;border-color:rgba(255,255,255,.3)}
.export-btn{
  font-family:'Syne Mono',monospace;font-size:11px;letter-spacing:.08em;
  background:rgba(79,255,176,.08);color:#4fffb0;border:1px solid rgba(79,255,176,.25);
  border-radius:999px;padding:8px 18px;cursor:pointer;transition:all .2s;
}
.export-btn:hover{background:rgba(79,255,176,.18);border-color:rgba(79,255,176,.5)}
.deck-title{
  font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:32px;
}
.deck-title span{color:var(--muted);font-weight:400;font-size:16px}
.day-group{margin-bottom:28px}
.day-label{
  font-family:'Syne Mono',monospace;font-size:11px;letter-spacing:.14em;
  color:var(--muted);border-bottom:1px solid var(--g2);padding-bottom:8px;margin-bottom:12px;
}
.day-empty{
  font-family:'Syne Mono',monospace;font-size:11px;color:var(--muted2);
  padding:8px 0 4px;letter-spacing:.04em;font-style:italic;
}
.timeline-entry{
  display:flex;gap:16px;align-items:flex-start;
  padding:10px 0;border-bottom:1px solid var(--g);
}
.timeline-time{
  font-family:'Syne Mono',monospace;font-size:13px;color:var(--muted);
  min-width:56px;flex-shrink:0;padding-top:2px;
}
.timeline-content{flex:1;min-width:0}
.timeline-content .tl-title{font-size:14px;font-weight:700;margin-bottom:2px}
.timeline-content .tl-meta{
  font-family:'Syne Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.04em;
}
.timeline-content .tl-track{
  display:inline-block;font-family:'Syne Mono',monospace;font-size:9px;letter-spacing:.08em;
  padding:2px 8px;border-radius:999px;margin-top:4px;
}
.remove-btn{
  font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:.06em;
  background:transparent;color:var(--muted2);border:1px solid var(--g);
  border-radius:8px;padding:5px 10px;cursor:pointer;transition:all .2s;flex-shrink:0;align-self:center;
}
.remove-btn:hover{color:#f87171;border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.08)}
.deck-cards-section{margin-top:40px}
.deck-cards-label{
  font-family:'Syne Mono',monospace;font-size:11px;letter-spacing:.14em;
  color:var(--muted);border-bottom:1px solid var(--g2);padding-bottom:8px;margin-bottom:16px;
}
.deck-cards{
  display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
}
@media(max-width:860px){.deck-cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.deck-cards{grid-template-columns:1fr}.deck-view{padding:100px 14px 40px}}
.deck-empty{
  text-align:center;padding:60px 20px;color:var(--muted);
}
.deck-empty .big{font-size:40px;line-height:1;margin-bottom:10px}
.deck-empty p{font-family:'Syne Mono',monospace;font-size:12px;letter-spacing:.06em}

/* ── AUTH ── */
.header-right{display:flex;align-items:center;gap:10px}
.auth-btn{
  font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:.08em;
  background:transparent;color:var(--muted);border:1px solid var(--g2);
  border-radius:999px;padding:7px 16px;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.auth-btn:hover{color:#e8eef8;border-color:rgba(255,255,255,.3)}
.user-pill{
  font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:.04em;
  color:var(--muted);display:flex;align-items:center;gap:6px;position:relative;
}
.user-pill button{
  font-family:'Syne Mono',monospace;font-size:9px;
  background:transparent;color:var(--muted2);border:1px solid var(--g2);
  border-radius:999px;padding:4px 10px;cursor:pointer;transition:all .2s;
}
.user-pill button:hover{color:#ff5555;border-color:#ff5555}

/* Auth modal */
.auth-overlay{
  position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.auth-overlay.hidden{display:none}
.auth-modal{
  background:var(--surface);border:1px solid var(--g2);border-radius:16px;
  padding:32px;width:100%;max-width:380px;text-align:center;
}
.auth-modal h2{font-size:18px;font-weight:800;margin-bottom:6px}
.auth-modal p{font-family:'Syne Mono',monospace;font-size:11px;color:var(--muted2);margin-bottom:20px;line-height:1.5}
.auth-input{
  width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--g2);
  background:var(--deep);color:var(--txt);font-family:'Syne Mono',monospace;font-size:13px;
  outline:none;margin-bottom:12px;transition:border-color .2s;
}
.auth-input:focus{border-color:rgba(79,255,176,.4)}
.auth-submit{
  width:100%;padding:12px;border:none;border-radius:10px;
  background:#4fffb0;color:#06080e;font-family:'Syne',sans-serif;
  font-size:14px;font-weight:800;cursor:pointer;transition:opacity .2s;
}
.auth-submit:hover{opacity:.85}
.auth-submit:disabled{opacity:.5;cursor:not-allowed}
.auth-msg{
  font-family:'Syne Mono',monospace;font-size:11px;color:#4fffb0;
  margin-top:12px;line-height:1.5;
}
.auth-close{
  font-family:'Syne Mono',monospace;font-size:10px;color:var(--muted2);
  background:transparent;border:none;cursor:pointer;margin-top:16px;
}
.auth-close:hover{color:var(--txt)}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="header-title">AIE EUROPE '26</div>
    <div class="header-sub">SESSION DECK BUILDER</div>
  </div>
  <div class="header-right">
    <div id="authArea">
      <button class="auth-btn" onclick="showAuthModal()">SIGN IN</button>
    </div>
    <button class="deck-btn" id="deckBtn" onclick="toggleDeck()">MY DECK (0)</button>
  </div>
</header>

<!-- Auth Modal -->
<div class="auth-overlay hidden" id="authOverlay" onclick="if(event.target===this)hideAuthModal()">
  <div class="auth-modal">
    <h2>Sign in</h2>
    <p>Enter your email to receive a magic link.<br>No password needed.</p>

<script>
/* ═══════════════════════════════════════════

const S = {

/* ═══════════════════════════════════════════
   SUPABASE
   ═══════════════════════════════════════════ */
const SUPABASE_URL = 'https://mkpqiczvmfnlmcqdjxhj.supabase.co';
const SUPABASE_ANON = 'sb_publishable_UJCQBC9E1Jwfdjm7duJbqA_wwnERyZZ';
const sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;

/* ── Auth UI ── */
function showAuthModal() {
  document.getElementById('authOverlay').classList.remove('hidden');
  document.getElementById('authMsg').classList.add('hidden');
  document.getElementById('authEmail').value = '';
  document.getElementById('authSubmit').disabled = false;
  setTimeout(() => document.getElementById('authEmail').focus(), 100);
}
function hideAuthModal() {
  document.getElementById('authOverlay').classList.add('hidden');
}

async function sendMagicLink() {
  const email = document.getElementById('authEmail').value.trim();
  if (!email) return;
  const btn = document.getElementById('authSubmit');
  const msg = document.getElementById('authMsg');
  btn.disabled = true;
  btn.textContent = 'SENDING...';

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: location.origin + location.pathname }
  });

  if (error) {
    msg.textContent = error.message;
    msg.style.color = '#ff5555';
  } else {
    msg.textContent = 'Check your email! Click the magic link to sign in.';
    msg.style.color = '#4fffb0';
  }
  msg.classList.remove('hidden');
  btn.textContent = 'SEND MAGIC LINK';
  btn.disabled = false;
}

function renderAuthUI() {
  const area = document.getElementById('authArea');
  if (S.user) {
    const email = S.user.email || '';
    const short = email.length > 20 ? email.slice(0, 17) + '...' : email;
    area.innerHTML = `<div class="user-pill"><span>${esc(short)}</span><button onclick="signOut()">SIGN OUT</button></div>`;
  } else {
    area.innerHTML = '<button class="auth-btn" onclick="showAuthModal()">SIGN IN</button>';
  }
}

async function signOut() {
  await sb.auth.signOut();
  S.user = null;
  renderAuthUI();
}

/* ── Deck Sync ── */
let _syncTimer = 0;
function scheduleDeckSync() {
  if (!S.user) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncDeckToSupabase, 300);
}

async function syncDeckToSupabase() {
  if (!S.user || !sb) return;
  await sb.from('decks').upsert({
    user_id: S.user.id,
    session_ids: S.deck,
    updated_at: new Date().toISOString()
  });
}

async function fetchRemoteDeck() {
  if (!S.user || !sb) return;
  const { data } = await sb.from('decks').select('session_ids').eq('user_id', S.user.id).single();
  if (data && data.session_ids) {
    /* Merge remote + local (union, no duplicates) */
    const merged = [...new Set([...S.deck, ...data.session_ids])];
    S.deck = merged;
    localStorage.setItem('aie_deck', JSON.stringify(S.deck));
    /* Sync merged back if it changed */
    if (merged.length !== data.session_ids.length) syncDeckToSupabase();
  } else {
    /* No remote deck yet — push local to remote */
    if (S.deck.length) syncDeckToSupabase();
  }
}

async function initAuth() {
  if (!sb) return;
  /* Listen for auth state changes (magic link return, sign out) */
  sb.auth.onAuthStateChange(async (event, session) => {
    S.user = session?.user || null;
    renderAuthUI();
    hideAuthModal();
    if (S.user) {
      await fetchRemoteDeck();
      /* Re-render cards with updated deck state */
      if (S.sessions.length) {
        renderGrid();
        applyFilters();
        updateDeckCount();
        if (S.deckMode) renderDeck();
      }
    }
  });
  /* Check existing session */
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    S.user = session.user;
    renderAuthUI();
    await fetchRemoteDeck();
  }
}

/* ═══════════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════════ */
const TRACKS = [

  'Voice & Vision':            {c1:'#06b6d4',c2:'#3b82f6',rgb:'6,182,212'},

  keynote:'type-keynote',workshop:'type-workshop',talk:'type-talk',

};

/* ═══════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════ */
const _escEl = document.createElement('span');
function esc(str) {
  _escEl.textContent = str || '';
  return _escEl.innerHTML;
}

/* ═══════════════════════════════════════════
   DATA
   ═══════════════════════════════════════════ */
function buildSpeakerMap(speakers) {
  for (const sp of speakers) {
    S.speakers[sp.name] = {
      role: sp.role || '',
      company: sp.company || '',
      photo: sp.photoUrl || ''
    };
  }
}

function normalize(rawSessions, rawSpeakers) {
  buildSpeakerMap(rawSpeakers);
  return rawSessions.map(s => {
    // Track normalization
    let track = s.track || '';
    if (track === 'GPUs & LLM Infrastructure') track = 'GPUs & LLM Infra';
    if (track.startsWith('Expo Sessions')) track = '';
    if (track === 'Leadership Lunch') track = '';

    // Type normalization
    let type = s.type || 'talk';
    if (type === 'track_keynote') type = 'keynote';
    if (type === 'expo_session') type = 'expo';

    // Title fallback
    let title = (s.title || '').trim();
    if (!title) {
      title = (s.speakers && s.speakers.length) ? s.speakers[0] : 'TBA';
    }

    // Day formatting: "April 9" -> "APR 9"
    let day = s.day || '';
    const dayMatch = day.match(/^(\w+)\s+(\d+)$/);
    if (dayMatch) {
      day = dayMatch[1].slice(0, 3).toUpperCase() + ' ' + dayMatch[2];
    }

    // Stable ID
    const idSrc = (s.title || '') + (s.day || '') + (s.time || '');
    const id = btoa(unescape(encodeURIComponent(idSrc))).replace(/[+/=]/g, '_').slice(0, 16);

    // Speaker enrichment
    const speakers = (s.speakers || []).map(name => {
      const info = S.speakers[name];
      return {
        name,
        role: info ? info.role : '',
        company: info ? info.company : '',
        photo: info ? info.photo : ''
      };
    });

    return { id, title, description: s.description || '', day, time: s.time || '', room: s.room || '', track, type, speakers };
  });
}

/* ═══════════════════════════════════════════
   RENDER - FILTERS
   ═══════════════════════════════════════════ */
function renderFilters() {
  const el = document.getElementById('filters');
  let html = '<button class="surprise-btn" onclick="shuffleCards()">\u2728 SURPRISE ME</button>';
  for (const t of TRACKS) {
    const c = COLORS[t] || FALLBACK_COLOR;
    html += `<button class="filter-pill" data-kind="track" data-val="${esc(t)}" style="--pill-c1:${c.c1}" onclick="setFilter('track','${esc(t)}')">${esc(t.toUpperCase())}</button>`;
  }
  html += '<div class="filter-divider"></div>';
  for (const t of TYPES) {
    html += `<button class="filter-pill" data-kind="type" data-val="${esc(t)}" onclick="setFilter('type','${esc(t)}')">${esc(t.toUpperCase())}</button>`;
  }
  el.innerHTML = html;
}

function shuffleCards() {
  for (let i = S.sessions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [S.sessions[i], S.sessions[j]] = [S.sessions[j], S.sessions[i]];
  }
  S.filterTrack = null;
  S.filterType = null;
  renderGrid();
  applyFilters();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

          </div>
        </div>
        <div class="c-body">
          <div class="c-title">${esc(s.title)}</div>
        </div>
        <div class="c-foot">
          <div class="c-foot-left">
            <div class="c-track">${esc(s.track)}</div>
            <div class="c-type ${typeClass}">${esc(s.type.toUpperCase())}</div>
          </div>
          <div class="c-copy">\u00A9 2026</div>
        </div>
        <button class="c-save" onclick="event.stopPropagation();toggleSave('${s.id}')">${saved ? '\u2713 SAVED' : '+ SAVE TO DECK'}</button>
      </div>
      <div class="card-back">
        <div class="cb-hint">\u2190 TAP TO FLIP BACK</div>
        <div class="cb-title">${esc(s.title)}</div>
        <div class="cb-track" style="color:${c.c1}">${esc(s.track)}${s.track && s.type ? ' \u00B7 ' : ''}${esc(s.type.toUpperCase())}</div>
        ${pitch ? `<div class="cb-divider"></div><div class="cb-pitch">${esc(pitch)}</div>` : ''}
        <div class="cb-divider"></div>
        ${spNames ? `<div class="cb-speaker">${esc(spNames)}</div>` : ''}
        ${spCompany ? `<div class="cb-role">${esc(spCompany)}</div>` : ''}
        <div class="cb-meta">
          <span>\uD83D\uDCC5 ${esc(s.day)} \u00B7 ${esc(s.time)}</span>
          <span>\uD83D\uDCCD ${esc(s.room)}</span>
        </div>
        ${s.description ? `<div class="cb-desc">${esc(s.description)}</div>` : ''}
        <button class="cb-save" onclick="toggleSave('${s.id}')">${saved ? '\u2713 SAVED' : '+ SAVE TO DECK'}</button>
      </div>

</div>`;
  }
  grid.innerHTML = html;
}

/* ═══════════════════════════════════════════
   FILTERS LOGIC
   ═══════════════════════════════════════════ */
function setFilter(kind, val) {
  if (kind === 'track') {
    S.filterTrack = S.filterTrack === val ? null : val;
  } else {
    S.filterType = S.filterType === val ? null : val;
  }
  applyFilters();
}

function applyFilters() {
  // Update pill active states
  document.querySelectorAll('.filter-pill').forEach(pill => {
    const k = pill.dataset.kind;
    const v = pill.dataset.val;
    const active = (k === 'track' && S.filterTrack === v) || (k === 'type' && S.filterType === v);
    pill.classList.toggle('active', active);
  });

  // Filter cards
  let visible = 0;
  document.querySelectorAll('.card-wrap').forEach(wrap => {
    const track = wrap.dataset.track;
    const type = wrap.dataset.type;
    const id = wrap.dataset.id;
    let show = true;
    if (S.filterTrack && track !== S.filterTrack) show = false;
    if (S.filterType && type !== S.filterType) show = false;
    if (S.deckMode && !S.deck.includes(id)) show = false;
    wrap.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  // Empty state
  const existing = document.querySelector('.empty-state');
  if (existing) existing.remove();
  if (visible === 0) {
    const msg = S.deckMode
      ? 'Your deck is empty. Save sessions to build your schedule.'
      : 'No sessions match these filters.';
    const grid = document.getElementById('grid');
    grid.insertAdjacentHTML('beforeend', `<div class="empty-state"><div class="big">\u2205</div><p>${msg}</p></div>`);
  }
}

/* ═══════════════════════════════════════════
   DECK LOGIC
   ═══════════════════════════════════════════ */
function toggleSave(id) {
  const idx = S.deck.indexOf(id);
  if (idx >= 0) {
    S.deck.splice(idx, 1);
  } else {
    S.deck.push(id);
  }
  localStorage.setItem('aie_deck', JSON.stringify(S.deck));
  scheduleDeckSync();

  // Update card DOM
  const wrap = document.querySelector(`.card-wrap[data-id="${id}"]`);
  if (wrap) {
    const saved = S.deck.includes(id);
    wrap.classList.toggle('saved', saved);
    /* Update all save buttons (front .c-save, back .cb-save) */
    wrap.querySelectorAll('.c-save,.cb-save').forEach(b => b.textContent = saved ? '\u2713 SAVED' : '+ SAVE TO DECK');
  }
  updateDeckCount();
  if (S.deckMode) { applyFilters(); renderDeck(); }

  /* Prompt sign-in when user saves their 3rd card (if not signed in) */
  if (!S.user && S.deck.length === 3) showAuthModal();
}

function updateDeckCount() {
  const onDeck = location.hash === '#deck';
  const btn = document.getElementById('deckBtn');
  btn.textContent = onDeck ? '\u2190 BACK' : `MY DECK (${S.deck.length})`;
  btn.classList.toggle('active', onDeck);
}

function toggleDeck() {
  location.hash = location.hash === '#deck' ? '#browse' : '#deck';
}

/* ═══════════════════════════════════════════
   ROUTING
   ═══════════════════════════════════════════ */
function route() {
  const hash = location.hash || '#browse';
  const isDeck = hash === '#deck';
  document.getElementById('grid').style.display = isDeck ? 'none' : '';
  document.querySelector('.filters-wrap').style.display = isDeck ? 'none' : '';
  const dv = document.getElementById('deckView');
  dv.classList.toggle('hidden', !isDeck);
  S.deckMode = isDeck;
  updateDeckCount();
  if (isDeck) renderDeck();
}

window.addEventListener('hashchange', route);

/* ═══════════════════════════════════════════
   DECK RENDERING
   ═══════════════════════════════════════════ */
const CONF_DAYS = ['April 8','April 9','April 10'];
const DAY_LABELS = {'April 8':'APR 8','April 9':'APR 9','April 10':'APR 10'};

function parseTimeSlot(timeStr) {
  /* Extract start time string e.g. "9:00" from "9:00-10:20am" for sorting */
  if (!timeStr) return 9999;
  const m = timeStr.match(/^(\d{1,2}):(\d{2})/);
  if (!m) return 9999;
  let h = parseInt(m[1], 10);
  const min = parseInt(m[2], 10);
  /* Detect PM from the time string */
  const isPM = /pm/i.test(timeStr);
  const isAM = /am/i.test(timeStr);
  if (isPM && h < 12) h += 12;
  if (isAM && h === 12) h = 0;
  /* For times like "1:00-2:30pm", start is also PM */
  if (!isAM && !isPM) { /* no suffix on the start portion, check end */ }
  return h * 60 + min;
}

function parseDayFromSession(s) {
  /* s.day is "APR 8" format, match back to full day */
  for (const d of CONF_DAYS) {
    const short = d.replace(/^(\w+)\s+/, (_, m) => m.slice(0,3).toUpperCase() + ' ');
    if (short === s.day) return d;
  }
  return null;
}

function renderDeck() {
  const dv = document.getElementById('deckView');
  const saved = S.sessions.filter(s => S.deck.includes(s.id));

  if (saved.length === 0) {
    dv.innerHTML = `
      <div class="deck-header">
        <button class="deck-back-btn" onclick="location.hash='#browse'">\u2190 BACK TO SESSIONS</button>
      </div>
      <div class="deck-title">MY DECK <span>(0 sessions)</span></div>
      <div class="deck-empty"><div class="big">\u2205</div><p>No sessions saved yet. Browse sessions to build your deck.</p></div>`;
    return;
  }

  /* Group by day */
  const byDay = {};
  for (const d of CONF_DAYS) byDay[d] = [];
  for (const s of saved) {
    const day = parseDayFromSession(s);
    if (day && byDay[day]) byDay[day].push(s);
  }
  /* Sort each day by time */
  for (const d of CONF_DAYS) {
    byDay[d].sort((a, b) => parseTimeSlot(a.time) - parseTimeSlot(b.time));
  }

  let html = `
    <div class="deck-header">
      <button class="deck-back-btn" onclick="location.hash='#browse'">\u2190 BACK TO SESSIONS</button>
      <button class="export-btn" onclick="exportICS()">EXPORT ICS \uD83D\uDCC5</button>
    </div>
    <div class="deck-title">MY DECK <span>(${saved.length} session${saved.length === 1 ? '' : 's'})</span></div>`;

  /* Timeline */
  for (const d of CONF_DAYS) {
    const label = DAY_LABELS[d] || d;
    html += `<div class="day-group"><div class="day-label">\u2500\u2500 ${esc(label)} \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500</div>`;
    if (byDay[d].length === 0) {
      html += `<div class="day-empty">(no saved sessions for this day)</div>`;
    } else {
      for (const s of byDay[d]) {
        const c = COLORS[s.track] || FALLBACK_COLOR;
        const spNames = s.speakers.map(sp => sp.name).join(', ') || '';
        const startTime = s.time.replace(/-.*$/, '').trim();
        html += `<div class="timeline-entry">
          <div class="timeline-time">${esc(startTime)}</div>
          <div class="timeline-content">
            <div class="tl-title">${esc(s.title)}</div>
            <div class="tl-meta">${spNames ? esc(spNames) : ''}${spNames && s.room ? ' \u00B7 ' : ''}${s.room ? esc(s.room) : ''}</div>
            ${s.track ? `<span class="tl-track" style="color:${c.c1};background:color-mix(in srgb,${c.c1} 14%,transparent);border:1px solid color-mix(in srgb,${c.c1} 25%,transparent)">${esc(s.track.toUpperCase())}</span>` : ''}
          </div>
          <button class="remove-btn" onclick="removeDeck('${s.id}')">Remove</button>
        </div>`;
      }
    }
    html += `</div>`;
  }

  /* Collector cards section */
  html += `<div class="deck-cards-section">
    <div class="deck-cards-label">\u2500\u2500 YOUR COLLECTOR CARDS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500</div>
    <div class="deck-cards">`;

  for (const s of saved) {
    const i = S.sessions.indexOf(s);
    const c = COLORS[s.track] || FALLBACK_COLOR;
    const bw = (1 + ((s.id.charCodeAt(0) * 7) % 3) * 0.4).toFixed(1);
    const typeClass = TYPE_COLORS[s.type] || '';
    const cardImg = S.cardImages[String(i)];
    const bgStyle = cardImg ? `background-image:url(data/card-images/${cardImg});` : '';
    const spNames = s.speakers.map(sp => sp.name).join(', ') || '';
    const spCompany = s.speakers.length ? (s.speakers[0].company || '') : '';

    const pitch = S.pitches[String(i)] || '';

    html += `<div class="card-wrap saved" style="--c1:${c.c1};--c2:${c.c2};--c1-rgb:${c.rgb};--bw:${bw}px">
      <div class="collector-shell" onclick="flipCard(event)">
        <div class="card-flipper">
          <div class="collector" style="${bgStyle}">
            <div class="c-head">
              <div class="c-head-left"><div class="c-day">${esc(s.day)}</div><div class="c-room">${esc(s.room)}</div></div>
              <div class="c-head-right"><div class="c-conf">AIE EUROPE '26</div><div class="c-barcode"></div></div>
            </div>
            <div class="c-body"><div class="c-title">${esc(s.title)}</div></div>
            <div class="c-foot">
              <div class="c-foot-left"><div class="c-track">${esc(s.track)}</div><div class="c-type ${typeClass}">${esc(s.type.toUpperCase())}</div></div>
              <div class="c-copy">\u00A9 2026</div>
            </div>
          </div>
          <div class="card-back">
            <div class="cb-hint">\u2190 TAP TO FLIP BACK</div>
            <div class="cb-title">${esc(s.title)}</div>
            <div class="cb-track" style="color:${c.c1}">${esc(s.track)}${s.track && s.type ? ' \u00B7 ' : ''}${esc(s.type.toUpperCase())}</div>
            ${pitch ? `<div class="cb-divider"></div><div class="cb-pitch">${esc(pitch)}</div>` : ''}
            <div class="cb-divider"></div>
            ${spNames ? `<div class="cb-speaker">${esc(spNames)}</div>` : ''}
            ${spCompany ? `<div class="cb-role">${esc(spCompany)}</div>` : ''}
            <div class="cb-meta">
              <span>\uD83D\uDCC5 ${esc(s.day)} \u00B7 ${esc(s.time)}</span>
              <span>\uD83D\uDCCD ${esc(s.room)}</span>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }

  html += `</div></div>`;
  dv.innerHTML = html;
}

function removeDeck(id) {
  const idx = S.deck.indexOf(id);
  if (idx >= 0) S.deck.splice(idx, 1);
  localStorage.setItem('aie_deck', JSON.stringify(S.deck));
  scheduleDeckSync();
  /* Also update browse view card state */
  const wrap = document.querySelector(`.grid .card-wrap[data-id="${id}"]`);
  if (wrap) {
    wrap.classList.remove('saved');
    const btn = wrap.querySelector('.save-btn');
    if (btn) btn.textContent = '+ SAVE TO DECK';
    const cbBtn = wrap.querySelector('.cb-save');
    if (cbBtn) cbBtn.textContent = '+ SAVE TO DECK';
  }
  renderDeck();
  updateDeckCount();
}

/* ═══════════════════════════════════════════
   ICS EXPORT
   ═══════════════════════════════════════════ */
function parseTime(timeStr, dayStr) {
  /* timeStr e.g. "9:00-10:20am" or "3:30-5:30pm"
     dayStr e.g. "April 9" -> date April 9, 2026 */
  const dayMatch = dayStr.match(/(\w+)\s+(\d+)/);
  if (!dayMatch) return null;
  const months = {january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12};
  const month = months[dayMatch[1].toLowerCase()];
  const date = parseInt(dayMatch[2], 10);
  if (!month) return null;

  const tMatch = timeStr.match(/^(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})\s*(am|pm)?$/i);
  if (!tMatch) return null;

  let startH = parseInt(tMatch[1], 10);
  let startM = parseInt(tMatch[2], 10);
  let endH = parseInt(tMatch[3], 10);
  let endM = parseInt(tMatch[4], 10);
  const ampm = (tMatch[5] || '').toLowerCase();

  /* Apply AM/PM — the suffix applies to the end time; infer start */
  if (ampm === 'pm') {
    if (endH < 12) endH += 12;
    if (startH < 12 && startH < endH - 12) startH += 12;
    if (startH < 12 && startH + 12 <= endH) startH += 12;
  } else if (ampm === 'am') {
    if (startH === 12) startH = 0;
    if (endH === 12) endH = 0;
  }

  const startDate = new Date(2026, month - 1, date, startH, startM, 0);
  const endDate = new Date(2026, month - 1, date, endH, endM, 0);
  return { start: startDate, end: endDate };
}

function toICSDate(d) {
  /* Format: 20260409T090000 (local time, no Z) */
  const pad = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
}

function exportICS() {
  const saved = S.sessions.filter(s => S.deck.includes(s.id));
  if (saved.length === 0) return;

  let cal = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//AIE Europe 26//Deck Builder//EN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n`;

  for (const s of saved) {
    const day = parseDayFromSession(s);
    if (!day) continue;
    const times = parseTime(s.time, day);
    if (!times) continue;

    const spNames = s.speakers.map(sp => sp.name).join(', ');
    const uid = s.id + '@aie-europe-26';
    const desc = [spNames, s.track, s.room, s.description].filter(Boolean).join('\\n');

    cal += `BEGIN:VEVENT\r\n`;
    cal += `UID:${uid}\r\n`;
    cal += `DTSTART:${toICSDate(times.start)}\r\n`;
    cal += `DTEND:${toICSDate(times.end)}\r\n`;
    cal += `SUMMARY:${s.title.replace(/[,;\\]/g, ' ')}\r\n`;
    cal += `LOCATION:Queen Elizabeth II Centre\\, London\r\n`;
    if (desc) cal += `DESCRIPTION:${desc.replace(/[,;]/g, ' ')}\r\n`;
    cal += `END:VEVENT\r\n`;
  }
  cal += `END:VCALENDAR\r\n`;

  const blob = new Blob([cal], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'aie-europe-26-deck.ics';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ═══════════════════════════════════════════
   CARD FLIP
   ═══════════════════════════════════════════ */
function flipCard(e) {
  if (e.target.closest('.cb-save') || e.target.closest('.save-btn')) return;
  const shell = e.currentTarget;
  const flipper = shell.querySelector('.card-flipper');
  if (!flipper) return;
  if (flipper.classList.contains('flipping-to-back') || flipper.classList.contains('flipping-to-front')) return;

  const isFlipped = flipper.classList.contains('flipped');

  /* Auto-close any other flipped card */
  const prev = document.querySelector('.card-flipper.flipped');
  if (prev && prev !== flipper) {
    prev.classList.remove('flipped');
    prev.classList.add('flipping-to-front');
    prev.addEventListener('animationend', () => prev.classList.remove('flipping-to-front'), { once: true });
  }

  if (isFlipped) {
    flipper.classList.remove('flipped');
    flipper.classList.add('flipping-to-front');
    flipper.addEventListener('animationend', () => flipper.classList.remove('flipping-to-front'), { once: true });
  } else {
    flipper.classList.add('flipping-to-back');
    flipper.addEventListener('animationend', () => {
      flipper.classList.remove('flipping-to-back');
      flipper.classList.add('flipped');
    }, { once: true });
  }
}

/* ═══════════════════════════════════════════
   TILT
   ═══════════════════════════════════════════ */
let _tiltRAF = 0;
function tiltMove(e) {
  const el = e.currentTarget;
  if (window.matchMedia('(hover: none)').matches) return;
  const flipper = el.querySelector('.card-flipper');
  if (flipper && flipper.classList.contains('flipped')) return;
  cancelAnimationFrame(_tiltRAF);
  _tiltRAF = requestAnimationFrame(() => {
    const rect = el.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    const rotY = (x - 0.5) * 20;
    const rotX = (0.5 - y) * 20;
    el.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.02)`;
    /* Set reflection vars on the inner .collector for ::after */
    const inner = el.querySelector('.collector');
    if (inner) { inner.style.setProperty('--mx', (x*100)+'%'); inner.style.setProperty('--my', (y*100)+'%'); }
  });
}

function tiltEnter(e) {
  const el = e.currentTarget;
  const flipper = el.querySelector('.card-flipper');
  if (flipper && flipper.classList.contains('flipped')) return;
  el.style.transition = 'transform .1s ease-out';
}

function tiltLeave(e) {
  const el = e.currentTarget;
  const flipper = el.querySelector('.card-flipper');
  if (flipper && flipper.classList.contains('flipped')) {
    el.style.transform = '';
    return;
  }
  el.style.transition = 'transform .4s ease-out';
  el.style.transform = 'rotateX(0) rotateY(0) scale(1)';
}

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
async function init() {
  showSkeletons();
  renderFilters();
  updateDeckCount();
  initAuth();

  try {
    const [sessRes, spkRes] = await Promise.all([
      fetch('data/sessions.json'),
      fetch('data/speakers.json')
    ]);
    if (!sessRes.ok || !spkRes.ok) throw new Error('Failed to load data');
    const sessData = await sessRes.json();
    const spkData = await spkRes.json();

    S.sessions = normalize(sessData.sessions, spkData.speakers);

    /* Load card image index (optional — fallback to CSS gradients) */
    try {
      const imgRes = await fetch('data/card-images/index.json');
      if (imgRes.ok) S.cardImages = await imgRes.json();
    } catch(_) {}

    /* Load pitch lines (optional) */
    try {
      const pitchRes = await fetch('data/pitches.json');
      if (pitchRes.ok) S.pitches = await pitchRes.json();
    } catch(_) {}

    renderGrid();
    applyFilters();
    route();
  } catch (err) {
    console.error(err);
    showError('Failed to load session data. Please refresh.');
  }
}

init();
</script>
