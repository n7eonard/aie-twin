<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIE Europe '26 — Session Deck Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
:root{
  --bg:#06080e;--surface:#111827;--deep:#0b0f1a;
  --g:rgba(255,255,255,.06);--g2:rgba(255,255,255,.11);
  --txt:#e8eef8;--muted:rgba(232,238,248,.38);--muted2:rgba(232,238,248,.2);
}
body{background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;font-size:14px;min-height:100vh}

/* ── ANIMATABLE ANGLE ── */
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}

/* ── HEADER ── */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;
  background:rgba(6,8,14,.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--g);
}
.header-title{font-size:18px;font-weight:800;letter-spacing:-.02em}
.header-sub{font-family:'Syne Mono',monospace;font-size:9px;color:var(--muted2);letter-spacing:.1em;margin-top:2px}
.deck-btn{
  font-family:'Syne Mono',monospace;font-size:11px;letter-spacing:.08em;
  background:transparent;color:var(--muted);border:1px solid var(--g2);
  border-radius:999px;padding:8px 18px;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.deck-btn:hover,.deck-btn.active{color:#e8eef8;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06)}
.deck-btn.active{background:rgba(79,255,176,.1);border-color:rgba(79,255,176,.3);color:#4fffb0}

/* ── FILTERS ── */
.filters-wrap{
  position:sticky;top:56px;z-index:90;
  background:rgba(6,8,14,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--g);padding:10px 24px;
}
.filters{
  display:flex;gap:6px;overflow-x:auto;align-items:center;
  max-width:1400px;margin:0 auto;
  -ms-overflow-style:none;scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none}
.filter-pill{
  font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:.06em;
  background:transparent;color:var(--muted);border:1px solid var(--g2);
  border-radius:999px;padding:6px 14px;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.filter-pill:hover{color:#e8eef8;border-color:rgba(255,255,255,.2)}
.filter-pill.active{
  color:#fff;
  border-color:var(--pill-c1,rgba(255,255,255,.4));
  background:color-mix(in srgb,var(--pill-c1,#fff) 18%,transparent);
}
.filter-divider{
  width:1px;height:20px;background:var(--g2);flex-shrink:0;margin:0 4px;
}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  max-width:1400px;margin:0 auto;
  padding:120px 24px 60px;
}
@media(max-width:1200px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:860px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.grid{grid-template-columns:1fr;padding:110px 14px 40px}.header{padding:12px 14px}.filters-wrap{padding:8px 14px}}

/* ── SKELETON ── */
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.15}}
.skeleton{
  aspect-ratio:3/4;border-radius:12px;
  background:var(--surface);animation:pulse 1.5s ease-in-out infinite;
}

/* ── EMPTY STATE ── */
.empty-state{
  grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:80px 20px;color:var(--muted);text-align:center;
}
.empty-state .big{font-size:40px;line-height:1}
.empty-state p{font-family:'Syne Mono',monospace;font-size:12px;letter-spacing:.06em}

/* ── CARD WRAPPER ── */
.card-wrap{
  display:flex;flex-direction:column;contain:layout style;
}
.card-wrap.hidden{display:none}
.card-wrap.saved .collector-border{opacity:1!important}
.card-wrap.saved .collector{box-shadow:0 0 24px -4px rgba(var(--c1-rgb),0.35)}

/* ── COLLECTOR CARD ── */
.collector{
  aspect-ratio:3/4;position:relative;border-radius:12px;overflow:hidden;
  cursor:pointer;will-change:transform;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:16px;color:#fff;
  transition:transform .15s ease;
}
.collector::before{
  content:'';position:absolute;inset:0;z-index:0;
  background:
    linear-gradient(135deg,var(--c1) 0%,transparent 50%),
    linear-gradient(225deg,var(--c2) 0%,transparent 50%),
    linear-gradient(180deg,rgba(0,0,0,.3) 0%,rgba(0,0,0,.8) 100%);
}
.collector::after{
  content:'';position:absolute;inset:0;z-index:3;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.12) 0%,transparent 60%);
  opacity:0;transition:opacity .25s;pointer-events:none;
}
.collector:hover::after{opacity:1}

/* ── IRIDESCENT BORDER ── */
@keyframes rotate-border{0%{--angle:0deg}100%{--angle:360deg}}
.collector-border{
  position:absolute;inset:-2px;z-index:-1;border-radius:14px;
  background:conic-gradient(from var(--angle),#f0abfc,#818cf8,#38bdf8,#34d399,#fbbf24,#fb7185,#f0abfc);
  animation:rotate-border 4s linear infinite;
  opacity:0;transition:opacity .3s;
}
.collector:hover .collector-border{opacity:1}

/* ── CARD INNER ── */
.c-head,.c-body,.c-foot{position:relative;z-index:2}
.c-head{display:flex;justify-content:space-between;align-items:flex-start}
.c-head-left{display:flex;flex-direction:column;gap:2px}
.c-day{font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:.12em;opacity:.7}
.c-room{font-family:'Syne Mono',monospace;font-size:8px;letter-spacing:.1em;opacity:.45}
.c-head-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.c-conf{font-family:'Syne Mono',monospace;font-size:7px;letter-spacing:.15em;opacity:.5}
.c-barcode{
  width:48px;height:14px;
  background:repeating-linear-gradient(90deg,
    rgba(255,255,255,.5) 0px,rgba(255,255,255,.5) var(--bw,1.5px),
    transparent var(--bw,1.5px),transparent calc(var(--bw,1.5px) + 1.5px)
  );
  opacity:.35;
}
.c-body{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 6px}
.c-title{font-size:15px;font-weight:700;line-height:1.25;letter-spacing:-.01em;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.c-foot{display:flex;justify-content:space-between;align-items:flex-end}
.c-foot-left{display:flex;flex-direction:column;gap:2px}
.c-track{font-family:'Syne Mono',monospace;font-size:8px;letter-spacing:.1em;opacity:.6;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-type{
  font-family:'Syne Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
}
.c-copy{font-family:'Syne Mono',monospace;font-size:7px;opacity:.3;letter-spacing:.06em}

/* ── TYPE COLORS ── */
.type-keynote{color:#fbbf24}
.type-workshop{color:#60a5fa}
.type-talk{color:rgba(255,255,255,.6)}
.type-lightning{color:#c084fc}
.type-expo{color:rgba(255,255,255,.45)}

/* ── INFO PANEL ── */
.info-panel{
  background:var(--surface);border:1px solid var(--g);
  border-top:none;border-radius:0 0 12px 12px;
  padding:14px 16px;display:flex;flex-direction:column;gap:8px;
  margin-top:-2px;
}
.info-speaker{font-size:13px;font-weight:700}
.info-company{font-family:'Syne Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.04em}
.info-desc{
  font-size:12px;line-height:1.5;color:var(--muted);
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.info-meta{font-family:'Syne Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:.04em}
.save-btn{
  font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:.08em;
  background:transparent;color:var(--muted);border:1px solid var(--g2);
  border-radius:999px;padding:6px 16px;cursor:pointer;transition:all .2s;
  align-self:flex-start;
}
.save-btn:hover{color:#e8eef8;border-color:rgba(255,255,255,.3)}
.card-wrap.saved .save-btn{
  color:var(--c1);border-color:var(--c1);background:color-mix(in srgb,var(--c1) 10%,transparent);
}

/* ── ERROR STATE ── */
.error-state{
  grid-column:1/-1;text-align:center;padding:80px 20px;color:#ff5555;
}
.error-state p{font-family:'Syne Mono',monospace;font-size:12px;margin-top:8px;color:var(--muted)}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="header-title">AIE EUROPE '26</div>
    <div class="header-sub">SESSION DECK BUILDER</div>
  </div>
  <button class="deck-btn" id="deckBtn" onclick="toggleDeck()">MY DECK (0)</button>
</header>

<div class="filters-wrap">
  <div class="filters" id="filters"></div>
</div>

<main class="grid" id="grid"></main>

<script>
/* ═══════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════ */
const S = {
  sessions: [],
  speakers: {},
  deck: JSON.parse(localStorage.getItem('aie_deck') || '[]'),
  filterTrack: null,
  filterType: null,
  deckMode: false
};

/* ═══════════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════════ */
const TRACKS = [
  'Context Engineering','Evals & Observability','Harness Engineering',
  'Claws & Personal Agents','Voice & Vision','Coding Agents',
  'GPUs & LLM Infra','MCP','AI Architects','Generative Media',
  'Google DeepMind/Gemini'
];
const TYPES = ['keynote','workshop','talk','lightning','expo'];

const COLORS = {
  'Context Engineering':       {c1:'#3b82f6',c2:'#8b5cf6',rgb:'59,130,246'},
  'MCP':                       {c1:'#10b981',c2:'#06b6d4',rgb:'16,185,129'},
  'Coding Agents':             {c1:'#f97316',c2:'#ef4444',rgb:'249,115,22'},
  'Harness Engineering':       {c1:'#ec4899',c2:'#f43f5e',rgb:'236,72,153'},
  'Evals & Observability':     {c1:'#f59e0b',c2:'#eab308',rgb:'245,158,11'},
  'Voice & Vision':            {c1:'#06b6d4',c2:'#3b82f6',rgb:'6,182,212'},
  'Claws & Personal Agents':   {c1:'#8b5cf6',c2:'#6366f1',rgb:'139,92,246'},
  'AI Architects':             {c1:'#e2e8f0',c2:'#94a3b8',rgb:'226,232,240'},
  'GPUs & LLM Infra':          {c1:'#ef4444',c2:'#f97316',rgb:'239,68,68'},
  'Google DeepMind/Gemini':    {c1:'#4285f4',c2:'#34a853',rgb:'66,133,244'},
  'Generative Media':          {c1:'#84cc16',c2:'#14b8a6',rgb:'132,204,22'},
};
const FALLBACK_COLOR = {c1:'#64748b',c2:'#475569',rgb:'100,116,137'};

const TYPE_COLORS = {
  keynote:'type-keynote',workshop:'type-workshop',talk:'type-talk',
  lightning:'type-lightning',expo:'type-expo'
};

/* ═══════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════ */
const _escEl = document.createElement('span');
function esc(str) {
  _escEl.textContent = str || '';
  return _escEl.innerHTML;
}

/* ═══════════════════════════════════════════
   DATA
   ═══════════════════════════════════════════ */
function buildSpeakerMap(speakers) {
  for (const sp of speakers) {
    S.speakers[sp.name] = {
      role: sp.role || '',
      company: sp.company || '',
      photo: sp.photoUrl || ''
    };
  }
}

function normalize(rawSessions, rawSpeakers) {
  buildSpeakerMap(rawSpeakers);
  return rawSessions.map(s => {
    // Track normalization
    let track = s.track || '';
    if (track === 'GPUs & LLM Infrastructure') track = 'GPUs & LLM Infra';
    if (track.startsWith('Expo Sessions')) track = '';
    if (track === 'Leadership Lunch') track = '';

    // Type normalization
    let type = s.type || 'talk';
    if (type === 'track_keynote') type = 'keynote';
    if (type === 'expo_session') type = 'expo';

    // Title fallback
    let title = (s.title || '').trim();
    if (!title) {
      title = (s.speakers && s.speakers.length) ? s.speakers[0] : 'TBA';
    }

    // Day formatting: "April 9" -> "APR 9"
    let day = s.day || '';
    const dayMatch = day.match(/^(\w+)\s+(\d+)$/);
    if (dayMatch) {
      day = dayMatch[1].slice(0, 3).toUpperCase() + ' ' + dayMatch[2];
    }

    // Stable ID
    const idSrc = (s.title || '') + (s.day || '') + (s.time || '');
    const id = btoa(unescape(encodeURIComponent(idSrc))).replace(/[+/=]/g, '_').slice(0, 16);

    // Speaker enrichment
    const speakers = (s.speakers || []).map(name => {
      const info = S.speakers[name];
      return {
        name,
        role: info ? info.role : '',
        company: info ? info.company : '',
        photo: info ? info.photo : ''
      };
    });

    return { id, title, description: s.description || '', day, time: s.time || '', room: s.room || '', track, type, speakers };
  });
}

/* ═══════════════════════════════════════════
   RENDER - FILTERS
   ═══════════════════════════════════════════ */
function renderFilters() {
  const el = document.getElementById('filters');
  let html = '';
  for (const t of TRACKS) {
    const c = COLORS[t] || FALLBACK_COLOR;
    html += `<button class="filter-pill" data-kind="track" data-val="${esc(t)}" style="--pill-c1:${c.c1}" onclick="setFilter('track','${esc(t)}')">${esc(t.toUpperCase())}</button>`;
  }
  html += '<div class="filter-divider"></div>';
  for (const t of TYPES) {
    html += `<button class="filter-pill" data-kind="type" data-val="${esc(t)}" onclick="setFilter('type','${esc(t)}')">${esc(t.toUpperCase())}</button>`;
  }
  el.innerHTML = html;
}

/* ═══════════════════════════════════════════
   RENDER - GRID
   ═══════════════════════════════════════════ */
function showSkeletons() {
  const grid = document.getElementById('grid');
  grid.innerHTML = Array.from({length:12}, () => '<div class="skeleton"></div>').join('');
}

function showError(msg) {
  const grid = document.getElementById('grid');
  grid.innerHTML = `<div class="error-state"><div style="font-size:32px">!</div><p>${esc(msg)}</p></div>`;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  let html = '';
  for (const s of S.sessions) {
    const c = COLORS[s.track] || FALLBACK_COLOR;
    const saved = S.deck.includes(s.id);
    const bw = (1 + ((s.id.charCodeAt(0) * 7) % 3) * 0.4).toFixed(1);
    const spNames = s.speakers.map(sp => sp.name).join(', ') || '';
    const spCompany = s.speakers.length ? (s.speakers[0].company || '') : '';
    const typeClass = TYPE_COLORS[s.type] || '';

    html += `<div class="card-wrap${saved ? ' saved' : ''}" data-id="${s.id}" data-track="${esc(s.track)}" data-type="${esc(s.type)}" style="--c1:${c.c1};--c2:${c.c2};--c1-rgb:${c.rgb};--bw:${bw}px">
  <div class="collector" onmouseenter="tiltEnter(event)" onmouseleave="tiltLeave(event)" onmousemove="tiltMove(event)">
    <div class="collector-border"></div>
    <div class="c-head">
      <div class="c-head-left">
        <div class="c-day">${esc(s.day)}</div>
        <div class="c-room">${esc(s.room)}</div>
      </div>
      <div class="c-head-right">
        <div class="c-conf">AIE EUROPE '26</div>
        <div class="c-barcode"></div>
      </div>
    </div>
    <div class="c-body">
      <div class="c-title">${esc(s.title)}</div>
    </div>
    <div class="c-foot">
      <div class="c-foot-left">
        <div class="c-track">${esc(s.track)}</div>
        <div class="c-type ${typeClass}">${esc(s.type.toUpperCase())}</div>
      </div>
      <div class="c-copy">\u00A9 2026</div>
    </div>
  </div>
  <div class="info-panel">
    ${spNames ? `<div class="info-speaker">${esc(spNames)}</div>` : ''}
    ${spCompany ? `<div class="info-company">${esc(spCompany)}</div>` : ''}
    ${s.description ? `<div class="info-desc">${esc(s.description)}</div>` : ''}
    <div class="info-meta">${esc(s.time)}${s.room ? ' \u00B7 ' + esc(s.room) : ''}</div>
    <button class="save-btn" onclick="toggleSave('${s.id}')">${saved ? '\u2713 SAVED' : '+ SAVE TO DECK'}</button>
  </div>
</div>`;
  }
  grid.innerHTML = html;
}

/* ═══════════════════════════════════════════
   FILTERS LOGIC
   ═══════════════════════════════════════════ */
function setFilter(kind, val) {
  if (kind === 'track') {
    S.filterTrack = S.filterTrack === val ? null : val;
  } else {
    S.filterType = S.filterType === val ? null : val;
  }
  applyFilters();
}

function applyFilters() {
  // Update pill active states
  document.querySelectorAll('.filter-pill').forEach(pill => {
    const k = pill.dataset.kind;
    const v = pill.dataset.val;
    const active = (k === 'track' && S.filterTrack === v) || (k === 'type' && S.filterType === v);
    pill.classList.toggle('active', active);
  });

  // Filter cards
  let visible = 0;
  document.querySelectorAll('.card-wrap').forEach(wrap => {
    const track = wrap.dataset.track;
    const type = wrap.dataset.type;
    const id = wrap.dataset.id;
    let show = true;
    if (S.filterTrack && track !== S.filterTrack) show = false;
    if (S.filterType && type !== S.filterType) show = false;
    if (S.deckMode && !S.deck.includes(id)) show = false;
    wrap.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  // Empty state
  const existing = document.querySelector('.empty-state');
  if (existing) existing.remove();
  if (visible === 0) {
    const msg = S.deckMode
      ? 'Your deck is empty. Save sessions to build your schedule.'
      : 'No sessions match these filters.';
    const grid = document.getElementById('grid');
    grid.insertAdjacentHTML('beforeend', `<div class="empty-state"><div class="big">\u2205</div><p>${msg}</p></div>`);
  }
}

/* ═══════════════════════════════════════════
   DECK LOGIC
   ═══════════════════════════════════════════ */
function toggleSave(id) {
  const idx = S.deck.indexOf(id);
  if (idx >= 0) {
    S.deck.splice(idx, 1);
  } else {
    S.deck.push(id);
  }
  localStorage.setItem('aie_deck', JSON.stringify(S.deck));

  // Update card DOM
  const wrap = document.querySelector(`.card-wrap[data-id="${id}"]`);
  if (wrap) {
    const saved = S.deck.includes(id);
    wrap.classList.toggle('saved', saved);
    const btn = wrap.querySelector('.save-btn');
    if (btn) btn.textContent = saved ? '\u2713 SAVED' : '+ SAVE TO DECK';
  }
  updateDeckCount();
  if (S.deckMode) applyFilters();
}

function updateDeckCount() {
  document.getElementById('deckBtn').textContent = `MY DECK (${S.deck.length})`;
}

function toggleDeck() {
  S.deckMode = !S.deckMode;
  document.getElementById('deckBtn').classList.toggle('active', S.deckMode);
  applyFilters();
}

/* ═══════════════════════════════════════════
   TILT STUBS (Task 5)
   ═══════════════════════════════════════════ */
function tiltEnter(e) {}
function tiltLeave(e) {}
function tiltMove(e) {}

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
async function init() {
  showSkeletons();
  renderFilters();
  updateDeckCount();

  try {
    const [sessRes, spkRes] = await Promise.all([
      fetch('data/sessions.json'),
      fetch('data/speakers.json')
    ]);
    if (!sessRes.ok || !spkRes.ok) throw new Error('Failed to load data');
    const sessData = await sessRes.json();
    const spkData = await spkRes.json();

    S.sessions = normalize(sessData.sessions, spkData.speakers);
    renderGrid();
    applyFilters();
  } catch (err) {
    console.error(err);
    showError('Failed to load session data. Please refresh.');
  }
}

init();
</script>
</body>
</html>
